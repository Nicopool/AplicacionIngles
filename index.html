<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Linguist - Aprende inglés de forma interactiva con lectura inmersiva, juegos y práctica real. Diseñado para smartphones." />
  <title>Linguist — Aprende Inglés</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CRÍTICO: Cargar CDNs aquí (síncronos) para garantizar window.supabase antes que el módulo -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Splash screen visible mientras carga la app -->
  <div id="splash" style="
    position:fixed; inset:0; z-index:9999;
    background: linear-gradient(135deg, #6C63FF 0%, #3ECFCF 100%);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px;
    font-family: 'Inter', sans-serif; color: white;
  ">
    <div style="font-size:56px;">🌍</div>
    <div style="font-size:24px; font-weight:800; letter-spacing:-0.5px;">Linguist</div>
    <div style="font-size:13px; opacity:0.8;">Cargando tu experiencia...</div>
    <div style="
      width:40px; height:40px; border:3px solid rgba(255,255,255,0.3);
      border-top-color:white; border-radius:50%;
      animation: spin 0.8s linear infinite; margin-top:8px;
    "></div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </div>

  <div id="app"></div>

  <!-- App principal — los módulos ES tienen defer implícito y se ejecutan DESPUÉS de los scripts del head -->
  <script type="module" src="app.js?v=16"></script>

  <!-- Ocultar splash cuando el módulo esté listo -->
  <script>
    window._hideSplash = function() {
      var s = document.getElementById('splash');
      if (s) { s.style.opacity = '0'; s.style.transition = 'opacity 0.4s'; setTimeout(function(){ s.remove(); }, 400); }
    };
  </script>
</body>
</html>
